version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"

dockers:
  - image_templates:
      - "ghcr.io/ajustinjames/simple-wol:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "ghcr.io/ajustinjames/simple-wol:{{ .Version }}-arm64"
    use: buildx
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/ajustinjames/simple-wol:{{ .Version }}"
    image_templates:
      - "ghcr.io/ajustinjames/simple-wol:{{ .Version }}-amd64"
      - "ghcr.io/ajustinjames/simple-wol:{{ .Version }}-arm64"
  - name_template: "ghcr.io/ajustinjames/simple-wol:latest"
    image_templates:
      - "ghcr.io/ajustinjames/simple-wol:{{ .Version }}-amd64"
      - "ghcr.io/ajustinjames/simple-wol:{{ .Version }}-arm64"

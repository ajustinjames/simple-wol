<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple WoL — Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-container">
        <h1>Simple WoL</h1>

        {{if .NeedsSetup}}
        <form id="setup-form" onsubmit="return handleSetup(event)">
            <h2>Create Account</h2>
            <p class="subtitle">Set up your admin account to get started.</p>
            <div class="form-group">
                <label for="setup-username">Username</label>
                <input type="text" id="setup-username" name="username" required autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label for="setup-password">Password</label>
                <input type="password" id="setup-password" name="password" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="setup-confirm">Confirm Password</label>
                <input type="password" id="setup-confirm" name="confirm" required autocomplete="new-password">
            </div>
            <div id="setup-error" class="error" hidden></div>
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
        {{else}}
        <form id="login-form" onsubmit="return handleLogin(event)">
            <div id="setup-success" class="success" hidden>Account created successfully. Please log in.</div>
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" name="username" required autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" required autocomplete="current-password">
            </div>
            <div class="form-group checkbox-group">
                <label><input type="checkbox" id="login-remember" name="remember"> Remember me</label>
            </div>
            <div id="login-error" class="error" hidden></div>
            <button type="submit" class="btn btn-primary">Log In</button>
        </form>
        {{end}}
    </div>

    <script src="/static/login.js"></script>
</body>
</html>

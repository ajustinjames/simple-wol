<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple WoL</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="header">
        <h1>Simple WoL</h1>
        <div class="header-actions">
            <button id="account-btn" class="btn btn-secondary btn-sm">Account</button>
            <button id="logout-btn" class="btn btn-secondary btn-sm">Logout</button>
        </div>
    </div>

    <div class="toolbar">
        <button id="add-device-btn" class="btn btn-primary btn-sm">Add Device</button>
        <button id="scan-btn" class="btn btn-secondary btn-sm">Scan Network</button>
    </div>

    <div id="account-modal" class="modal-overlay" hidden>
        <div class="modal">
            <div class="modal-header">
                <h2>Account Settings</h2>
                <button id="account-close-btn" class="btn btn-secondary btn-sm" type="button">Close</button>
            </div>

            <div id="account-error" class="error" hidden></div>
            <div id="account-success" class="success" hidden></div>

            <form id="username-form">
                <h3>Change Username</h3>
                <div class="form-group">
                    <label for="account-current-username">Current Username</label>
                    <input type="text" id="account-current-username" disabled>
                </div>
                <div class="form-group">
                    <label for="account-new-username">New Username</label>
                    <input type="text" id="account-new-username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="username-confirm-password">Password</label>
                    <input type="password" id="username-confirm-password" autocomplete="current-password">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-sm">Update Username</button>
                </div>
            </form>

            <hr>

            <form id="password-form">
                <h3>Change Password</h3>
                <div class="form-group">
                    <label for="account-current-password">Current Password</label>
                    <input type="password" id="account-current-password" autocomplete="current-password">
                </div>
                <div class="form-group">
                    <label for="account-new-password">New Password</label>
                    <input type="password" id="account-new-password" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="account-confirm-password">Confirm New Password</label>
                    <input type="password" id="account-confirm-password" autocomplete="new-password">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-sm">Update Password</button>
                </div>
            </form>
        </div>
    </div>

    <div id="add-form" class="inline-form" hidden>
        <div class="form-row">
            <div class="form-group">
                <label for="add-name">Name</label>
                <input type="text" id="add-name" placeholder="My PC">
            </div>
            <div class="form-group">
                <label for="add-mac">MAC Address</label>
                <input type="text" id="add-mac" placeholder="AA:BB:CC:DD:EE:FF">
            </div>
            <div class="form-group">
                <label for="add-ip">IP Address</label>
                <input type="text" id="add-ip" placeholder="192.168.1.100">
            </div>
            <div class="form-group">
                <label for="add-port">WoL Port</label>
                <input type="number" id="add-port" value="9">
            </div>
        </div>
        <div class="form-actions">
            <button id="cancel-add-btn" class="btn btn-secondary btn-sm">Cancel</button>
            <button id="save-device-btn" class="btn btn-primary btn-sm">Save</button>
        </div>
    </div>

    <div id="scan-results" class="scan-results" hidden></div>

    <div class="content">
        <div id="device-list"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
